title: "Deploy Your AI Agent — OpenClaw on the Cloud"
slug: openclaw-cloud-deploy
version: "2.2"

spiral_loops:
  - name: "Local"
    description: "Docker basics, OpenClaw in Docker, config-as-code repo, Telegram working"
    modules: [0, 1, 2, 3]
  - name: "Deploy"
    description: "$5 VPS, native OpenClaw install, config-as-code deploy via GitHub Actions"
    modules: [4, 5, 6]
  - name: "Production"
    description: "Security, tunnel, Docker support services, monitoring, kill switch, integrations"
    modules: [7, 8, 9, 10]

modules:

  # ===============================================================
  # MODULE 0 — SPEED RUN (standalone evening track)
  # ===============================================================

  - id: "00-speed-run"
    title: "Speed Run — Your Bot Tonight"
    subtitle: "Get OpenClaw running with Telegram in one evening"
    loop: local
    tier: intro
    estimated_time: "2-3 hours"
    description: |
      The fast track. You'll install Docker, run OpenClaw locally, connect
      Telegram, and have a working AI agent you can message from your phone —
      all before bedtime. No server, no cloud, no security — just the dopamine
      hit of "holy crap, it works."
    objectives:
      - Install Docker Desktop on your machine
      - Run OpenClaw in a Docker container
      - Create a Telegram bot and connect it (long polling — no tunnel needed)
      - Send your first message and get a response
    concepts:
      - What OpenClaw is and how it works (30-second version)
      - Docker = a way to run software in a box
      - API keys = passwords for AI services
      - Telegram bots = the easiest chat integration (long polling, outbound only)
    note: |
      This module is self-contained. If you just want a working bot tonight,
      start and end here. The rest of the course teaches you to deploy it on
      a server that runs 24/7, properly secured and monitored.

  # ===============================================================
  # LOOP 1: LOCAL — Get it working on your laptop
  # ===============================================================

  - id: "01-ai-agents"
    title: "What Are AI Agents (And Why Run Your Own)?"
    subtitle: "From chatbots to autonomous agents — and why self-hosting matters"
    loop: local
    tier: conceptual
    estimated_time: "30 min"
    description: |
      Before we touch any tools, let's understand what we're building. What
      makes an AI agent different from ChatGPT? Why would you run one yourself?
      What's OpenClaw specifically? Short module — just enough context to make
      every later decision make sense.
    objectives:
      - Explain the difference between a chatbot, an AI assistant, and an AI agent
      - Describe OpenClaw's architecture (you -> chat app -> server -> AI APIs)
      - Understand why self-hosting gives you control, privacy, and flexibility
      - Get your Anthropic API key ready
    concepts:
      - AI agents vs chatbots vs assistants
      - The OpenClaw architecture diagram
      - API keys and pay-per-use AI billing
      - Self-hosting tradeoffs (control vs responsibility)

  - id: "02-docker-local"
    title: "Docker on Your Machine"
    subtitle: "Containers, Compose, and your first running services"
    loop: local
    tier: hands-on
    estimated_time: "1.5 hours"
    description: |
      Instead of installing software directly on your machine (messy, version
      conflicts), we'll run everything in containers. Docker is like shipping
      containers for software — standardized boxes that work the same everywhere.
      You'll install Docker Desktop, learn the essential commands, and run your
      first multi-service stack with Docker Compose. This is the same tool you'll
      use to deploy to the cloud later.
    objectives:
      - Install Docker Desktop on your machine
      - Understand images (blueprints) vs containers (running instances)
      - Run your first container and inspect its logs
      - Write a docker-compose.yml with multiple services
      - Understand volumes, networks, and port mapping
      - Know the essential Docker commands for daily operations
    concepts:
      - Containers vs VMs vs bare metal
      - Docker images vs containers
      - Docker Compose (orchestrating multiple containers)
      - Volumes (persistent data that survives restarts)
      - Networks (how containers talk to each other)
      - Port mapping (localhost:3000 -> container:3000)

  - id: "03-openclaw-local"
    title: "OpenClaw in Docker — Your Bot Works!"
    subtitle: "Running OpenClaw locally, config-as-code, Telegram, and the deep dive"
    loop: local
    tier: hands-on
    estimated_time: "2 hours"
    description: |
      Time for the payoff. You'll run OpenClaw in Docker, connect Telegram,
      and build your config-as-code repo — the Git repository that defines
      your bot's personality (SOUL.md), skills, model selection, and
      integration settings. This repo is the single source of truth that
      deploys identically to your server later. You'll also explore OpenClaw's
      features: 35+ tools, memory system, skills, and 23+ chat channels.
    objectives:
      - Run OpenClaw in Docker and complete onboarding
      - Create a Telegram bot via @BotFather and connect it
      - Build a config-as-code repo (openclaw.json, SOUL.md, skills/)
      - Understand OpenClaw's JSON5 config format and SecretRef pattern
      - Explore the skills system, memory, and built-in tools
      - Send a message from your phone and get a response
    concepts:
      - OpenClaw's Docker image and gateway architecture (port 18789)
      - Config-as-code (openclaw.json + SOUL.md + skills/)
      - SecretRef pattern (source: env, file, or exec)
      - Telegram Bot API and @BotFather
      - Long polling vs webhooks (why Telegram works without a tunnel)
      - OpenClaw skills, memory (MEMORY.md), and 35+ built-in tools

  # ===============================================================
  # LOOP 2: DEPLOY — Get it running on a server 24/7
  # ===============================================================

  - id: "04-cloud-vps"
    title: "Your Computer in the Sky"
    subtitle: "A $5/mo VPS on AWS Lightsail, SSH, Linux basics, and Node.js"
    loop: deploy
    tier: hands-on
    estimated_time: "2 hours"
    description: |
      Your bot works locally, but it only runs when your laptop is open.
      Time to get a server. You'll spin up a $5/mo Lightsail instance
      (1GB RAM — plenty for native OpenClaw), install Node.js, and set
      up Docker for support services. OpenClaw runs natively for minimal
      RAM usage; Docker handles the extras (tunnel, monitoring, kill switch).
    objectives:
      - Create an AWS account and navigate to Lightsail
      - Launch a 1GB Ubuntu instance ($5/mo, first 3 months free)
      - Attach a static IP address
      - Generate SSH keys and connect to your VPS
      - Create an SSH config shortcut (ssh openclaw)
      - Navigate the Linux filesystem
      - Install Node.js and Docker on the VPS
    concepts:
      - What a VPS is (your rented computer in the cloud)
      - Why $5/mo works (native OpenClaw needs <512MB RAM)
      - The Mac Mini alternative (home server economics)
      - Cloud providers landscape (AWS, Hetzner, DigitalOcean)
      - SSH key pairs (public/private) — why passwords are bad
      - Linux filesystem basics (/home, /etc, /var)
      - Hybrid approach (native app + Docker support services)

  - id: "05-github-deploy"
    title: "Git Push to Deploy"
    subtitle: "Your config-as-code repo + GitHub Actions = automatic deployment"
    loop: deploy
    tier: hands-on
    estimated_time: "1.5 hours"
    description: |
      You have a config-as-code repo on your laptop and a server waiting
      in the cloud. Instead of SSH-ing in and hand-editing files, you'll
      push your repo to GitHub and set up Actions to auto-deploy when you
      push. Change your bot's personality in SOUL.md, push, and it's live.
      The deploy script pulls your config, installs/updates OpenClaw, and
      restarts the gateway. Support services deploy via docker compose.
    objectives:
      - Push your config-as-code repo to a private GitHub repo
      - Set up .gitignore as a security boundary (secrets never in git)
      - Configure GitHub Actions for auto-deploy to your VPS
      - Deploy script: git pull + npm update + openclaw gateway restart + docker compose up
      - Add SSH keys and secrets to GitHub Actions
      - Test the full workflow (edit SOUL.md -> push -> personality changes live)
    concepts:
      - Config-as-Code (personality, skills, config in git — secrets on server)
      - .gitignore as a security boundary
      - GitHub Actions basics (triggers, steps, secrets)
      - Hybrid deploy (native OpenClaw + Docker support services)
      - Disaster recovery (clone repo + recreate secrets = back in business)

  - id: "06-verify-instance"
    title: "It's Alive — Verifying on the Instance"
    subtitle: "OpenClaw running natively on the VPS, Telegram working 24/7"
    loop: deploy
    tier: hands-on
    estimated_time: "1 hour"
    description: |
      Your GitHub Actions deploy just pushed your config-as-code repo to the
      VPS. OpenClaw is installed natively, your config and personality are
      in place. Now verify everything works. Run openclaw doctor, check the
      gateway status, send a Telegram message. Then close your laptop lid
      and send another message — it still works. That's the payoff.
    objectives:
      - SSH in and verify config-as-code landed correctly
      - Run openclaw doctor to validate the setup
      - Start the gateway (openclaw gateway start)
      - Verify Telegram works from the instance
      - Confirm the bot responds when your laptop is off
      - Know the daily ops (openclaw gateway status/restart/logs)
    concepts:
      - Native OpenClaw on Linux (systemd daemon, no Docker)
      - openclaw doctor (health checks and diagnostics)
      - Gateway lifecycle (start, stop, restart, status, logs)
      - Verifying a deployment (health checks, test messages)
      - The satisfaction of closing your laptop and the bot still works

  # ===============================================================
  # LOOP 3: PRODUCTION — Secure, monitor, extend
  # ===============================================================

  - id: "07-security"
    title: "The Lethal Trifecta (And How Not to Die)"
    subtitle: "Security fundamentals + secrets management"
    loop: production
    tier: hands-on
    estimated_time: "2 hours"
    description: |
      Your bot works, but it's running with secrets in plain text and no
      firewall. Time to fix that. This module covers the three things that
      get servers owned (open ports + exposed secrets + no monitoring), then
      immediately fixes two of them: firewall setup and proper secrets
      management with Docker Secrets. Monitoring comes in Module 9.
    objectives:
      - Identify the "lethal trifecta" and why each is dangerous
      - Configure UFW firewall (deny all inbound, allow SSH)
      - Set up automatic OS security updates
      - Move API keys to file-based secrets with SecretRef pattern
      - Understand why .env files leak (process listing, /proc, logs)
      - Set correct file permissions (chmod 600) on sensitive files
      - Docker support services: 127.0.0.1 port binding (Docker bypasses UFW)
    concepts:
      - The lethal trifecta — open ports + exposed secrets + no monitoring
      - Attack surface — every open port is a door
      - Defense in depth — multiple layers
      - Principle of least privilege
      - UFW firewall basics (deny all, allow specific)
      - OpenClaw SecretRef pattern (source: file for native app)
      - Docker Secrets for support services (cloudflared, monitoring)
      - Why .env files leak and how to avoid it
      - Docker bypasses UFW — always use 127.0.0.1: prefix on support containers

  - id: "08-cloudflare-tunnel"
    title: "Zero Open Ports — Cloudflare Tunnel"
    subtitle: "Exposing services without exposing your server"
    loop: production
    tier: hands-on
    estimated_time: "1.5 hours"
    description: |
      Here's the magic trick: your VPS has NO open ports (except SSH), yet
      external services can still reach it. Cloudflare Tunnel creates an
      outbound connection from your server to Cloudflare's network. Traffic
      flows through the tunnel — your server is invisible to the internet.
      You'll add cloudflared as a Docker service and route subdomains to
      your internal services.
    objectives:
      - Explain how Cloudflare Tunnel works (outbound only, no inbound ports)
      - Set up a Cloudflare account and add a domain
      - Create and configure a tunnel
      - Add cloudflared to your docker-compose.yml
      - Route subdomains through the tunnel (openclaw, monitoring, killswitch)
      - Verify zero open inbound ports (except SSH)
    concepts:
      - Traditional webhooks (open port) vs tunnel (outbound only)
      - How Cloudflare Tunnel works under the hood
      - DNS routing (subdomain -> tunnel -> local service)
      - Docker networking (how cloudflared reaches other containers)
      - Why zero open ports is a game-changer for security

  - id: "09-monitoring-killswitch"
    title: "Monitoring + Kill Switch"
    subtitle: "Know when it breaks, shut it down when it misbehaves"
    loop: production
    tier: hands-on
    estimated_time: "2 hours"
    description: |
      The third leg of the lethal trifecta is "no monitoring." Your bot could
      crash at 3am and you wouldn't know. This module adds Uptime Kuma to your
      Docker stack (accessed via tunnel), sets up push notifications, and builds
      a kill switch with multiple escalation levels so you can shut down a
      rogue agent from your phone.
    objectives:
      - Add Uptime Kuma to docker-compose.yml
      - Route the monitoring dashboard through Cloudflare Tunnel
      - Configure health checks for OpenClaw and support services
      - Set up push notifications (Telegram, email, or Discord)
      - Build a kill switch endpoint routed through the tunnel
      - Bookmark the kill URL on your phone
      - Test the full kill + revive cycle
      - Know the escalation playbook (URL -> SSH -> provider app)
    concepts:
      - Why monitoring completes the security trifecta
      - Uptime Kuma (self-hosted monitoring)
      - Health checks (active polling vs dead-man's switch)
      - Alert fatigue — monitoring the right things
      - Kill switches for AI agents (runaway costs, prompt injection)
      - Docker socket access (kill container stops OpenClaw)
      - The escalation playbook

  - id: "10-bonus-integrations"
    title: "Power Ups — GitHub, Gmail, Notion, and More"
    subtitle: "Connecting your AI agent to the rest of your digital life"
    loop: production
    tier: hands-on
    estimated_time: "2-3 hours"
    description: |
      Your bot is running, secured, monitored, and killable. Now make it
      useful. Each integration is independent — pick the ones you want.
    objectives:
      - Set up GitHub with fine-grained tokens
      - Configure Gmail with OAuth2 and a dedicated account
      - Connect Notion for task capture and note-taking
      - Add Google Drive for file storage
      - Apply security principles to each integration (least privilege)
    concepts:
      - Fine-grained GitHub tokens (scoped permissions)
      - OAuth2 flow (Google APIs)
      - Prompt injection via email (biggest AI-specific risk)
      - The "dedicated account" pattern
      - Token rotation and expiration as a habit
