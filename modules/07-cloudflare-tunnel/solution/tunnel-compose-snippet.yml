# Cloudflare Tunnel service for Docker Compose
# Add this service block to your existing docker-compose.yml
#
# This container creates an outbound-only connection to Cloudflare.
# Traffic from the internet reaches your services through this tunnel
# without any inbound ports open on your VPS.

services:

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped

    # "tunnel run" tells cloudflared to start the tunnel using the
    # token from the TUNNEL_TOKEN environment variable. No config
    # file needed -- all routing is managed in the Cloudflare dashboard.
    command: tunnel run

    environment:
      # Your tunnel token from the Cloudflare Zero Trust dashboard.
      # This authenticates the tunnel and links it to your account.
      # In production (Module 9), we'll move this to a Docker secret.
      - TUNNEL_TOKEN=eyJhIjoiNzA2...your-actual-token-here

    networks:
      # Must be on the same network as your other services so
      # cloudflared can forward traffic to them by container name.
      # e.g., "openclaw:3000" resolves because both containers
      # share this network.
      - openclaw-net

    # Note: NO ports section. This is intentional.
    # cloudflared only makes OUTBOUND connections to Cloudflare.
    # It never needs to listen for inbound traffic.
    # This is the entire point -- zero open ports.
