# OpenClaw Full Stack -- Docker Compose
#
# This file defines the complete OpenClaw deployment:
#   - openclaw:     The AI agent (receives WhatsApp messages, calls Claude API)
#   - cloudflared:  Cloudflare Tunnel (routes external traffic without open ports)
#   - searxng:      Private search engine (web search for the AI agent)
#   - uptime-kuma:  Monitoring dashboard (configured in Module 10)
#   - killswitch:   Emergency stop endpoint (configured in Module 11)
#
# All ports are bound to 127.0.0.1 -- accessible only from the server itself.
# External access is handled exclusively through Cloudflare Tunnel.
#
# Usage:
#   docker compose up -d          # Start everything
#   docker compose down           # Stop everything
#   docker compose logs -f        # Follow all logs
#   docker compose pull && docker compose up -d  # Update all services

version: "3.8"
services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    env_file: .env
    secrets:
      - anthropic_api_key
      - whatsapp_access_token
      - whatsapp_verify_token
      - whatsapp_app_secret
      - github_token
      - notion_api_key
    volumes:
      # Config: OpenClaw settings, persists across container recreates
      - ./config:/home/openclaw/.openclaw
      # Google OAuth credentials (for Gmail, Drive, Calendar integrations)
      - ./config/google:/home/openclaw/.google
      # Persistent data: conversation history, etc.
      - ./data:/home/openclaw/data
      # GitHub repos cloned by the agent
      - ./repos:/home/openclaw/repos
    ports:
      # 127.0.0.1 = localhost only. Cloudflare Tunnel reaches this internally.
      - "127.0.0.1:3000:3000"
    networks:
      - openclaw-net
    depends_on:
      # Wait for SearXNG to start before OpenClaw
      - searxng
    healthcheck:
      # Docker checks this endpoint every 30s. After 3 failures, marks unhealthy.
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    # The tunnel token (from the secret) tells cloudflared which tunnel to use
    # and where to route traffic. No config file needed.
    command: tunnel run
    secrets:
      - tunnel_token
    networks:
      - openclaw-net
    depends_on:
      # Wait for OpenClaw to start before opening the tunnel
      - openclaw

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # SearXNG reads its config from /etc/searxng/settings.yml
      - ./config/searxng:/etc/searxng
    networks:
      - openclaw-net

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      # Named volume -- Docker manages the storage location
      - uptime-kuma-data:/app/data
    networks:
      - openclaw-net

  killswitch:
    image: nginx:alpine
    container_name: killswitch
    restart: unless-stopped
    secrets:
      - kill_secret
    ports:
      - "127.0.0.1:3999:80"
    volumes:
      # Custom nginx config defining the kill endpoint
      - ./config/killswitch/nginx.conf:/etc/nginx/conf.d/default.conf
      # Docker socket access -- allows this container to stop other containers
      # This is powerful; the kill_secret prevents unauthorized use
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - openclaw-net

# Secrets: one file per secret, mounted at /run/secrets/<name> in containers.
# Files should contain the raw value only (no quotes, no trailing newline).
# All files should have permissions set to 600.
secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  whatsapp_access_token:
    file: ./secrets/whatsapp_access_token
  whatsapp_verify_token:
    file: ./secrets/whatsapp_verify_token
  whatsapp_app_secret:
    file: ./secrets/whatsapp_app_secret
  github_token:
    file: ./secrets/github_token
  notion_api_key:
    file: ./secrets/notion_api_key
  tunnel_token:
    file: ./secrets/tunnel_token
  kill_secret:
    file: ./secrets/kill_secret

# Single bridge network -- all services can reach each other by service name.
# e.g., OpenClaw reaches SearXNG at http://searxng:8080
networks:
  openclaw-net:
    driver: bridge

# Named volumes -- Docker manages the storage location on the host.
# Use for data that doesn't need to be directly edited from the host.
volumes:
  uptime-kuma-data:
