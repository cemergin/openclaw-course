version: "3.8"
services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    env_file: .env
    secrets:
      - anthropic_api_key
      - whatsapp_access_token
      - whatsapp_verify_token
      - whatsapp_app_secret
      # TODO: Uncomment these when you set up GitHub and Notion integrations
      # - github_token
      # - notion_api_key
    volumes:
      - ./config:/home/openclaw/.openclaw
      - ./config/google:/home/openclaw/.google
      - ./data:/home/openclaw/data
      - ./repos:/home/openclaw/repos
    ports:
      # NOTE: The 127.0.0.1 prefix is critical -- it keeps this port off the public internet.
      # Only Cloudflare Tunnel (running on the same host) can reach it.
      - "127.0.0.1:3000:3000"
    networks:
      - openclaw-net
    depends_on:
      - searxng
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    secrets:
      - tunnel_token
    networks:
      - openclaw-net
    depends_on:
      - openclaw

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./config/searxng:/etc/searxng
    networks:
      - openclaw-net

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - openclaw-net

  killswitch:
    image: nginx:alpine
    container_name: killswitch
    restart: unless-stopped
    secrets:
      - kill_secret
    ports:
      - "127.0.0.1:3999:80"
    volumes:
      - ./config/killswitch/nginx.conf:/etc/nginx/conf.d/default.conf
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - openclaw-net

secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  whatsapp_access_token:
    file: ./secrets/whatsapp_access_token
  whatsapp_verify_token:
    file: ./secrets/whatsapp_verify_token
  whatsapp_app_secret:
    file: ./secrets/whatsapp_app_secret
  # TODO: Uncomment when you add these integrations
  # github_token:
  #   file: ./secrets/github_token
  # notion_api_key:
  #   file: ./secrets/notion_api_key
  tunnel_token:
    file: ./secrets/tunnel_token
  kill_secret:
    file: ./secrets/kill_secret

networks:
  openclaw-net:
    driver: bridge

volumes:
  uptime-kuma-data:
