# Docker Compose Challenge Solution -- Module 4
# A mini stack running SearXNG and a status page
#
# This is the same pattern you'll use for the full OpenClaw deployment
# in Module 9 -- just with more services.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: challenge-searxng
    restart: unless-stopped
    ports:
      # Bound to 127.0.0.1 so only the VPS itself can reach it.
      # Without the 127.0.0.1 prefix, this port would be open to the internet.
      - "127.0.0.1:8080:8080"
    volumes:
      # Named volume for SearXNG's config directory.
      # This persists settings across container restarts and recreations.
      - searxng-config:/etc/searxng
    networks:
      - stack

  status:
    image: nginx:latest
    container_name: challenge-status
    restart: unless-stopped
    ports:
      # Same 127.0.0.1 binding pattern for the status page.
      - "127.0.0.1:8081:80"
    volumes:
      # Bind mount: a host directory mapped into the container.
      # :ro means read-only -- the container can't modify these files.
      - ./status-html:/usr/share/nginx/html:ro
    networks:
      - stack

# Explicit network so we control which services can communicate.
# Both services are on "stack", so they can reach each other by name.
networks:
  stack:

# Named volume declaration. Docker manages the storage location.
# Find it on disk with: docker volume inspect challenge_searxng-config
volumes:
  searxng-config:
