version: "3.8"

services:
  secret-test:
    image: alpine:latest
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["sh", "-c", "echo 'Secrets loaded. Sleeping...' && sleep 3600"]
    volumes:
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    # TODO: Add the secrets this service needs.
    # Each secret listed here must also be defined in the top-level "secrets:" section below.
    # Syntax:
    #   secrets:
    #     - secret_name
    secrets: []
    env_file:
      - .env

# TODO: Define your secrets here.
# Each secret needs a name and a file path.
# The file path is relative to this docker-compose file.
#
# Syntax:
#   secrets:
#     secret_name:
#       file: ./path/to/secret/file
#
# You need entries for:
#   - anthropic_api_key
#   - whatsapp_access_token
#   - whatsapp_app_secret
#   - whatsapp_verify_token
secrets: {}
