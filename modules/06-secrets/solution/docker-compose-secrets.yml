version: "3.8"

services:
  secret-test:
    image: alpine:latest
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["sh", "-c", "echo 'Secrets loaded. Sleeping...' && sleep 3600"]
    volumes:
      # Mount the wrapper script as read-only
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    # Each secret listed here gets mounted at /run/secrets/<name> inside the container.
    # Only secrets listed here are available to this service --
    # other services in the same compose file won't see them unless they also list them.
    secrets:
      - anthropic_api_key
      - whatsapp_access_token
      - whatsapp_app_secret
      - whatsapp_verify_token
    # Non-secret configuration goes in .env as usual
    env_file:
      - .env

# Top-level secrets definition.
# Each entry maps a secret name to a file on the host.
# Docker reads these files at container startup and mounts them at /run/secrets/<name>.
# The files are never copied into Docker's image layers or metadata.
secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  whatsapp_access_token:
    file: ./secrets/whatsapp_access_token
  whatsapp_app_secret:
    file: ./secrets/whatsapp_app_secret
  whatsapp_verify_token:
    file: ./secrets/whatsapp_verify_token
