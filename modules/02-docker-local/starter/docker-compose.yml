# Docker Compose Exercise -- Module 2
# A two-service stack: nginx web server + whoami debug service

services:
  web:
    image: nginx:latest
    container_name: exercise-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - frontend

  whoami:
    image: traefik/whoami:latest
    container_name: exercise-whoami
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    networks:
      - frontend

networks:
  frontend:
