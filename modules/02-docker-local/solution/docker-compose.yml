# Docker Compose Challenge Solution -- Module 2
# A three-service stack: nginx + whoami + httpbin
#
# This demonstrates the core patterns you'll use throughout the course:
# - Multiple services in one file
# - Shared network for service discovery
# - Named volumes for persistent data
# - 127.0.0.1 port binding for security

services:
  web:
    image: nginx:latest
    container_name: challenge-web
    restart: unless-stopped
    ports:
      # Bound to 127.0.0.1 so only the machine itself can reach it.
      - "127.0.0.1:8080:80"
    volumes:
      # Bind mount: host directory mapped into the container.
      # :ro means read-only -- the container can't modify these files.
      - ./html:/usr/share/nginx/html:ro
      # Named volume for nginx's cache directory.
      - nginx-cache:/var/cache/nginx
    networks:
      - playground

  whoami:
    image: traefik/whoami:latest
    container_name: challenge-whoami
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    networks:
      - playground

  httpbin:
    image: kennethreitz/httpbin
    container_name: challenge-httpbin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    networks:
      - playground

# Explicit network so we control which services can communicate.
# All three services are on "playground", so they can reach each other by name.
networks:
  playground:

# Named volume declaration. Docker manages the storage location.
volumes:
  nginx-cache:
