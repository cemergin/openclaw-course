# WhatsApp Integration -- Docker Compose Snippet
# Merge this into your existing docker-compose.yml from Module 7
#
# This file shows the WhatsApp-specific additions you need.
# It's not meant to be used standalone -- it's a reference for
# what to add to your existing compose file.

services:
  openclaw:
    # ... your existing openclaw service config ...
    secrets:
      # Add these to your existing secrets list:
      - whatsapp_access_token
      - whatsapp_phone_number_id
      - whatsapp_business_account_id
      - whatsapp_app_secret
      - whatsapp_verify_token
      # Keep any secrets you already have (claude_api_key, etc.)

  # Your cloudflared service should already be running from Module 7.
  # No changes needed to it -- the tunnel already routes to openclaw.

# Add these to your existing secrets section:
secrets:
  whatsapp_access_token:
    file: ./secrets/whatsapp_access_token
  whatsapp_phone_number_id:
    file: ./secrets/whatsapp_phone_number_id
  whatsapp_business_account_id:
    file: ./secrets/whatsapp_business_account_id
  whatsapp_app_secret:
    file: ./secrets/whatsapp_app_secret
  whatsapp_verify_token:
    file: ./secrets/whatsapp_verify_token
