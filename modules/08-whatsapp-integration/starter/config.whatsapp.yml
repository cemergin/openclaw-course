# WhatsApp Configuration for OpenClaw
# Add this section to your OpenClaw config file.
#
# TODO: Replace the phone number below with your actual WhatsApp number
# TODO: Set block_unknown to true after testing

whatsapp:
  enabled: true
  allowed_numbers:
    - "+YOURPHONENUMBER"    # TODO: replace with your number (e.g., +905551234567)
  block_unknown: false       # TODO: change to true after you've verified messages work
