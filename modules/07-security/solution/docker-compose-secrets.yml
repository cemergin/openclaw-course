# docker-compose.yml for SUPPORT SERVICES only (COMPLETED)
#
# In the hybrid approach:
# - OpenClaw runs NATIVELY on the VPS (not in Docker)
# - Support services (cloudflared, Uptime Kuma, kill switch) run in Docker
#
# Secrets are stored as files and mounted into containers via Docker Compose secrets.
# Port bindings use 127.0.0.1: prefix because Docker bypasses UFW.

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    # Read the tunnel token from the Docker secret file and pass it to cloudflared.
    command: >
      sh -c 'tunnel --no-autoupdate run --token $$(cat /run/secrets/cloudflare_tunnel_token)'
    secrets:
      - cloudflare_tunnel_token
    networks:
      - openclaw-net
    # No ports section -- outbound connections only.

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      # CRITICAL: 127.0.0.1 prefix prevents Docker from bypassing UFW.
      # Without this, the port is open to the entire internet!
      - "127.0.0.1:3001:3001"
    networks:
      - openclaw-net

networks:
  openclaw-net:

volumes:
  uptime-kuma-data:

# Top-level secrets declaration.
# Each entry maps a secret name to a file on the host.
# Docker mounts these as read-only files at /run/secrets/<name> inside the container.
secrets:
  cloudflare_tunnel_token:
    file: ./secrets/cloudflare_tunnel_token
