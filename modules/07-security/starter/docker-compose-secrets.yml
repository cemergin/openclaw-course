# docker-compose.yml for SUPPORT SERVICES only (STARTER TEMPLATE)
#
# In the hybrid approach:
# - OpenClaw runs NATIVELY on the VPS (not in Docker)
# - Support services (cloudflared, Uptime Kuma, kill switch) run in Docker
#
# This template shows how to configure Docker secrets for support services.
#
# TODO: Replace placeholder values with your actual secrets.
# TODO: Add any additional support services you need.

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    # TODO: Uncomment the command below and configure the tunnel token secret
    # command: >
    #   sh -c 'tunnel --no-autoupdate run --token $$(cat /run/secrets/cloudflare_tunnel_token)'
    # secrets:
    #   - cloudflare_tunnel_token
    networks:
      - openclaw-net
    # NOTE: No ports section! cloudflared makes outbound connections only.

  # uptime-kuma:
  #   image: louislam/uptime-kuma:1
  #   container_name: uptime-kuma
  #   restart: unless-stopped
  #   volumes:
  #     - uptime-kuma-data:/app/data
  #   ports:
  #     # CRITICAL: Always use 127.0.0.1: prefix for Docker containers!
  #     # Docker bypasses UFW -- without this prefix, the port is open to the internet.
  #     - "127.0.0.1:3001:3001"
  #   networks:
  #     - openclaw-net

networks:
  openclaw-net:

# volumes:
